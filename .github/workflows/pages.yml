name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Generate Go documentation
        run: |
          mkdir -p docs/api
          go install golang.org/x/pkgsite/cmd/pkgsite@latest || true
          # Generate text-based package docs as fallback
          for pkg in ecad ecfr ecmd ecee eni etransport; do
            go doc -all ./.$pkg > docs/api/${pkg}.txt 2>/dev/null || true
          done
          for pkg in internal/marshalling internal/sim; do
            name=$(basename $pkg)
            go doc -all ./$pkg > docs/api/${name}.txt 2>/dev/null || true
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    name: Deploy Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
